<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>h1
    <h1 id="demo"></h1>


</head>

<body>
    <script>
        function findMax() {
            let max = -Infinity;
            for (let i = 0; i < arguments.length; i++) {
                if (arguments[i] > max) {
                    max = arguments[i];
                }

            }
            return max;
        }


        x = findMax(1, 2, 3, 4, 5);
        console.log(x);

        document.getElementById("demo").innerHTML = "The result is " + x;
    </script>
</body>

</html>
