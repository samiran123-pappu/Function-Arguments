<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="demo"></h1>
    <script>
        // Function Rest Parameter


        function sum(...args) {
            let total = 0;
            for (let i = 0; i < args.length; i++) {
                total += args[i];
            }
            return total;
        }

        let x = sum(1, 2, 3, 4, 5);
        console.log(x); 

        document.getElementById("demo").innerHTML = "The result is " + x;
    </script>
</body>

</html>
