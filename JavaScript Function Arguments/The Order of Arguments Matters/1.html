<!DOCTYPE html>
<html>

<body>
    <h1>JavaScript Functions</h1>

    <p>The order of arguments matters.</p>

    <p id="demo"></p>

    <script>
        // Function to subtract two numbers
        function subtract(a, b) {
            return a - b;
        }

        let x1 = subtract(10, 5);
        let x2 = subtract(5, 10);

        document.getElementById("demo").innerHTML = "First Result: " + x1 + " <br>" + " Second Result: " + x2;
    </script>

</body>

</html>
